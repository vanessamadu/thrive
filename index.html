<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Thrive">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a8a70">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Outfit:wght@400;600;700&family=Gabriela&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<title>Thrive</title>
<style>
:root {
  --sage:        #1a8a70;
  --sage-light:  #3aaa90;
  --sage-pale:   #b8e8d8;
  --cream:       #F0FEFA;
  --cream-dark:  #B8E8D8;
  --white:       #FFFFFF;
  --dark:        #082820;
  --mid:         #2a6050;
  --muted:       #5a9888;
  --gold:        #e05030;
  --gold-pale:   #fef7e6;
  --mint:        #C0F0E4;
  --amber:       #fff3cc;
  --amber-dark:  #c87800;
  --blue-pale:   #e0eef8;
  --blue-dark:   #2060a0;
  --red-pale:    #fdecea;
  --red-dark:    #c0392b;
  --shadow:      0 2px 12px rgba(42,54,40,.10);
  --shadow-lg:   0 8px 32px rgba(42,54,40,.16);
  --r:           14px;
  --r-sm:        8px;
  --nav-h:       68px;
  --hdr-h:       56px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--cream); font-family: 'Nunito', sans-serif; color: var(--dark); overscroll-behavior: none; }
body { overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

/* ── HEADER ── */
#hdr {
  flex-shrink: 0; height: var(--hdr-h);
  background: var(--sage); color: var(--white);
  display: flex; align-items: center; padding: 0 16px;
  gap: 10px; position: relative; z-index: 10;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
#hdr-back {
  background: none; border: none; color: white; font-size: 22px;
  cursor: pointer; padding: 4px 8px 4px 0; display: none; line-height: 1;
}
#hdr-title { font-family: 'Gabriela', serif; font-size: 26px; font-weight: 400; flex: 1; letter-spacing: .2px; }
#hdr-sub { font-size: 12px; opacity: .75; white-space: nowrap; }
#hdr-action { background: rgba(255,255,255,.2); border: none; color: white; border-radius: 20px; padding: 6px 14px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }

/* ── CONTENT ── */
#content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.view { padding: 16px 16px calc(var(--nav-h) + 16px); min-height: 100%; }

/* ── BOTTOM NAV ── */
#nav {
  flex-shrink: 0; height: var(--nav-h);
  background: var(--white); border-top: 1.5px solid var(--cream-dark);
  display: flex; align-items: stretch;
  box-shadow: 0 -2px 12px rgba(0,0,0,.07);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; background: none; border: none; cursor: pointer;
  color: var(--muted); transition: color .15s; padding-bottom: env(safe-area-inset-bottom, 0);
  -webkit-tap-highlight-color: transparent;
}
.nav-btn.active { color: var(--sage); }
.nav-btn .icon { font-size: 22px; line-height: 1; }
.nav-btn .label { font-size: 9px; font-weight: 700; letter-spacing: .3px; }

/* ── CARDS ── */
.card { background: var(--white); border-radius: var(--r); box-shadow: var(--shadow); margin-bottom: 12px; overflow: hidden; }
.card-header { padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
.card-body { padding: 0 16px 16px; }
.section-label { font-size: 11px; font-weight: 800; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); margin: 20px 0 8px; }

/* ── PROGRESS BARS ── */
.nutrient-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.nutrient-bar-card { background: var(--white); border-radius: var(--r-sm); padding: 10px 12px; box-shadow: var(--shadow); }
.nutrient-bar-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.nutrient-bar-name { font-size: 11px; font-weight: 700; color: var(--mid); }
.nutrient-bar-val { font-size: 11px; font-weight: 800; color: var(--dark); }
.nutrient-bar-track { height: 6px; background: var(--cream-dark); border-radius: 3px; overflow: hidden; }
.nutrient-bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
.bar-under  { background: #c87800; }
.bar-ok     { background: var(--sage); }
.bar-over   { background: #2060a0; }
.nutrient-bar-pct { font-size: 10px; color: var(--muted); margin-top: 3px; text-align: right; }

/* ── MEAL SLOTS ── */
.meal-card { background: var(--white); border-radius: var(--r); box-shadow: var(--shadow); margin-bottom: 10px; overflow: hidden; }
.meal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.meal-header-left { display: flex; align-items: center; gap: 10px; }
.meal-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--sage-pale); }
.meal-dot.has-items { background: var(--sage); }
.meal-name { font-size: 15px; font-weight: 700; }
.meal-count { font-size: 11px; color: var(--muted); margin-left: 6px; }
.meal-chevron { font-size: 12px; color: var(--muted); transition: transform .2s; }
.meal-chevron.open { transform: rotate(180deg); }
.meal-body { border-top: 1px solid var(--cream-dark); }
.meal-item { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--cream); gap: 10px; }
.meal-item-info { flex: 1; min-width: 0; }
.meal-item-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.meal-item-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.meal-item-remove { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; line-height: 1; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
.meal-add-btn {
  display: flex; align-items: center; gap: 8px; padding: 12px 14px;
  background: none; border: none; color: var(--sage); font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer; width: 100%;
  -webkit-tap-highlight-color: transparent;
}

/* ── DAILY TOTALS ── */
.totals-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.total-pill { background: var(--mint); border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 700; color: var(--dark); }

/* ── RECIPE LIST ── */
.recipe-card { background: var(--white); border-radius: var(--r); box-shadow: var(--shadow); margin-bottom: 10px; padding: 14px 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; gap: 12px; }
.recipe-emoji { font-size: 28px; }
.recipe-info { flex: 1; min-width: 0; }
.recipe-name { font-size: 15px; font-weight: 700; }
.recipe-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.recipe-chevron { color: var(--muted); font-size: 14px; }

/* ── INGREDIENT LIST ── */
.group-header { background: var(--sage); color: white; padding: 8px 16px; font-size: 12px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase; }
.ing-row { display: flex; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--cream); gap: 12px; background: var(--white); cursor: pointer; -webkit-tap-highlight-color: transparent; }
.ing-name { flex: 1; font-size: 14px; font-weight: 600; }
.ing-preview { font-size: 11px; color: var(--muted); text-align: right; white-space: nowrap; }
.ing-custom-badge { background: var(--gold-pale); color: var(--gold); font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; }

/* ── FORMS ── */
.form-group { margin-bottom: 14px; }
label.form-label { display: block; font-size: 12px; font-weight: 800; color: var(--mid); margin-bottom: 6px; letter-spacing: .3px; text-transform: uppercase; }
input[type=text], input[type=number], select, textarea {
  width: 100%; padding: 12px 14px; border: 2px solid var(--cream-dark);
  border-radius: var(--r-sm); font-family: 'Nunito', sans-serif; font-size: 15px;
  background: var(--white); color: var(--dark); outline: none; transition: border-color .15s;
  -webkit-appearance: none; appearance: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--sage); }
textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── BUTTONS ── */
.btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 20px; border-radius: var(--r-sm); border: none; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; width: 100%; transition: opacity .15s; -webkit-tap-highlight-color: transparent; }
.btn:active { opacity: .8; }
.btn-primary { background: var(--sage); color: white; }
.btn-ghost { background: var(--cream); color: var(--dark); }
.btn-danger { background: var(--red-pale); color: var(--red-dark); }
.btn-sm { padding: 8px 16px; font-size: 13px; border-radius: 8px; width: auto; }
.btn-row { display: flex; gap: 10px; margin-top: 16px; }
.btn-row .btn { flex: 1; }

/* ── SHEET (bottom modal) ── */
#sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 50; opacity: 0; pointer-events: none; transition: opacity .25s; }
#sheet-backdrop.open { opacity: 1; pointer-events: all; }
#sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-radius: 20px 20px 0 0; z-index: 51; transform: translateY(100%); transition: transform .3s cubic-bezier(.32,0,.67,0); max-height: 92dvh; display: flex; flex-direction: column; }
#sheet.open { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: var(--cream-dark); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
.sheet-title { font-size: 17px; font-weight: 800; padding: 14px 16px 10px; flex-shrink: 0; }
.sheet-body { flex: 1; overflow-y: auto; padding: 0 16px 32px; }
.sheet-search { position: sticky; top: 0; background: var(--white); padding: 8px 0 10px; z-index: 2; }
.sheet-search input { background: var(--cream); border-color: var(--cream); }
.sheet-toggle { display: flex; background: var(--cream); border-radius: 10px; padding: 3px; margin-bottom: 10px; flex-shrink: 0; }
.sheet-toggle-btn { flex: 1; padding: 8px; border: none; background: none; border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; color: var(--muted); transition: all .15s; }
.sheet-toggle-btn.active { background: var(--white); color: var(--sage); box-shadow: var(--shadow); }
.sheet-result { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--cream); cursor: pointer; gap: 10px; -webkit-tap-highlight-color: transparent; }
.sheet-result:active { opacity: .7; }
.sheet-result-name { flex: 1; font-size: 14px; font-weight: 600; }
.sheet-result-group { font-size: 11px; color: var(--muted); }
.sheet-qty-section { background: var(--mint); border-radius: var(--r-sm); padding: 14px; margin-top: 12px; }
.sheet-qty-label { font-size: 13px; font-weight: 700; color: var(--sage); margin-bottom: 8px; }
.sheet-qty-row { display: flex; align-items: center; gap: 10px; }
.sheet-qty-row input { flex: 1; }
.sheet-qty-unit { font-size: 14px; font-weight: 700; color: var(--mid); white-space: nowrap; }

/* ── TARGETS ── */
.target-item { background: var(--white); border-radius: var(--r-sm); margin-bottom: 8px; padding: 14px; box-shadow: var(--shadow); }
.target-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.target-name { font-size: 14px; font-weight: 700; }
.target-input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.target-input-row input { max-width: 100px; padding: 8px 10px; font-size: 14px; }
.target-unit { font-size: 13px; color: var(--mid); font-weight: 600; }
.target-ref { font-size: 11px; color: var(--muted); font-style: italic; }
.target-why { font-size: 12px; color: var(--mid); margin-top: 6px; line-height: 1.5; background: var(--mint); border-radius: 6px; padding: 8px 10px; }

/* ── GUIDE ── */
.guide-item { background: var(--white); border-radius: var(--r-sm); margin-bottom: 8px; padding: 14px; box-shadow: var(--shadow); }
.guide-name { font-size: 15px; font-weight: 800; margin-bottom: 8px; color: var(--sage); }

/* ── MISC ── */
.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.6; }
.tag { display: inline-block; background: var(--mint); color: var(--sage); font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 4px; }
.divider { height: 1px; background: var(--cream-dark); margin: 12px 0; }
.inline-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--gold-pale); color: var(--gold); font-size: 11px; font-weight: 800; padding: 2px 8px; border-radius: 20px; margin-bottom: 12px; }
.page-intro { font-size: 14px; color: var(--mid); line-height: 1.6; background: var(--mint); border-radius: var(--r-sm); padding: 12px 14px; margin-bottom: 16px; }

/* ── RECIPE DETAIL ── */
.recipe-detail-header { background: var(--sage); color: white; padding: 20px 16px; margin: -16px -16px 16px; }
.recipe-detail-name { font-family: 'Gabriela', serif; font-size: 26px; font-weight: 400; }
.recipe-detail-meta { font-size: 13px; opacity: .8; margin-top: 4px; }
.recipe-ing-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--cream); }
.recipe-ing-name { font-size: 14px; font-weight: 600; }
.recipe-ing-grams { font-size: 13px; color: var(--muted); }
.recipe-ing-remove { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
.nutrient-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.nutrient-table td { padding: 7px 8px; border-bottom: 1px solid var(--cream); }
.nutrient-table td:first-child { font-weight: 700; color: var(--mid); }
.nutrient-table td:last-child { text-align: right; font-weight: 700; color: var(--dark); }

/* ── PORTION PRESETS ── */
.presets-section { margin: 10px 0; }
.presets-label { font-size: 12px; font-weight: 800; color: var(--mid); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 8px; }
.preset-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
.preset-chip { background: var(--mint); border: 2px solid var(--sage-pale); color: var(--sage); border-radius: 20px; padding: 7px 14px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; -webkit-tap-highlight-color: transparent; }
.preset-chip:active, .preset-chip.selected { background: var(--sage); color: white; border-color: var(--sage); }
.preset-chip-custom { background: var(--cream); border: 2px solid var(--cream-dark); color: var(--mid); }
.preset-chip-custom.selected { background: var(--mid); color: white; border-color: var(--mid); }
.preset-manage-chip { background: none; border: 2px dashed var(--sage-pale); color: var(--muted); border-radius: 20px; padding: 6px 12px; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.preset-item-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--cream); }
.preset-item-label { flex: 1; font-size: 14px; font-weight: 600; }
.preset-item-grams { font-size: 13px; color: var(--muted); }
.preset-item-del { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 2px 4px; }
.preset-add-form { background: var(--mint); border-radius: var(--r-sm); padding: 12px; margin-top: 8px; }

/* ── CHART ── */
.chart-toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.chart-range-btn { background:var(--cream); border:2px solid var(--cream-dark); color:var(--mid); border-radius:20px; padding:6px 14px; font-family:'Nunito',sans-serif; font-size:12px; font-weight:800; cursor:pointer; transition:all .15s; -webkit-tap-highlight-color:transparent; }
.chart-range-btn.active { background:var(--sage); border-color:var(--sage); color:white; }
.chart-nutrient-chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.chart-chip { border:2px solid transparent; border-radius:20px; padding:5px 12px; font-family:'Nunito',sans-serif; font-size:11px; font-weight:800; cursor:pointer; transition:all .15s; -webkit-tap-highlight-color:transparent; opacity:.45; }
.chart-chip.on { opacity:1; }
.chart-wrap { background:var(--white); border-radius:var(--r); box-shadow:var(--shadow); padding:16px 10px 10px; margin-bottom:12px; position:relative; }
.chart-canvas-container { position:relative; height:220px; }
.chart-legend { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; padding:0 4px; }
.chart-legend-item { display:flex; align-items:center; gap:5px; font-size:11px; font-weight:700; color:var(--mid); }
.chart-legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.chart-target-toggle { display:flex; align-items:center; gap:8px; font-size:12px; font-weight:700; color:var(--mid); padding:6px 0; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.chart-target-toggle input { width:16px; height:16px; accent-color:var(--sage); cursor:pointer; }
.history-tab-row { display:flex; background:var(--cream); border-radius:10px; padding:3px; margin-bottom:14px; }
.history-tab-btn { flex:1; padding:8px; border:none; background:none; border-radius:8px; font-family:'Nunito',sans-serif; font-size:14px; font-weight:700; cursor:pointer; color:var(--muted); transition:all .15s; -webkit-tap-highlight-color:transparent; }
.history-tab-btn.active { background:var(--white); color:var(--sage); box-shadow:var(--shadow); }

/* ── SEARCH CLEAR ── */
mark { background: var(--gold-pale); color: var(--gold); border-radius: 2px; padding: 0 1px; }

/* Safe area */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  #nav { padding-bottom: env(safe-area-inset-bottom); height: calc(var(--nav-h) + env(safe-area-inset-bottom)); }
  .view { padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px); }
  #sheet { padding-bottom: env(safe-area-inset-bottom); }
}
</style>
<script>
(function(){
  // Draw sunflower icon onto a canvas and use as PNG
  // Draw sunflower icon at 512px, scaled to 70% of canvas so petals fit with padding
  const SIZE = 1024;
  const c = document.createElement('canvas');
  c.width = c.height = SIZE;
  const ctx = c.getContext('2d');
  const cx = SIZE/2, cy = SIZE/2;
  const sc = SIZE * 0.85 / 192; // 70% scale so flower fits inside square
  // Background
  ctx.fillStyle = '#1a8a70';
  ctx.fillRect(0, 0, SIZE, SIZE);
  // Petals - outer ring
  for (let i = 0; i < 8; i++) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate((i * 45) * Math.PI / 180);
    ctx.fillStyle = 'rgba(255,224,50,0.95)';
    ctx.beginPath();
    ctx.ellipse(0, -42*sc, 10*sc, 28*sc, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // Petals - inner ring
  for (let i = 0; i < 8; i++) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate((i * 45 + 22.5) * Math.PI / 180);
    ctx.fillStyle = 'rgba(255,200,30,0.8)';
    ctx.beginPath();
    ctx.ellipse(0, -42*sc, 10*sc, 28*sc, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // Centre
  ctx.fillStyle = '#461408';
  ctx.beginPath();
  ctx.arc(cx, cy, 30*sc, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#300E04';
  ctx.beginPath();
  ctx.arc(cx, cy, 20*sc, 0, Math.PI * 2);
  ctx.fill();

  const iconUrl = c.toDataURL('image/png');

  // apple-touch-icon — most reliable for home screen icon on both iOS and Android Chrome
  const ati = document.createElement('link');
  ati.rel = 'apple-touch-icon';
  ati.href = iconUrl;
  document.head.appendChild(ati);

  // Also inject manifest for standalone display mode
  const m = {
    name: 'Thrive',
    short_name: 'Thrive',
    start_url: '.',
    display: 'standalone',
    background_color: '#F0FEFA',
    theme_color: '#1a8a70',
    orientation: 'portrait',
    icons: [
      { src: iconUrl, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  };
  const blob = new Blob([JSON.stringify(m)], {type: 'application/json'});
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = URL.createObjectURL(blob);
  document.head.appendChild(link);
})();
</script>

<body>
<div id="app">
  <header id="hdr">

    dailyPlan: {date: TODAY, meals: {breakfast:[],morningSnack:[],lunch:[],afternoonSnack:[],dinner:[],eveningSnack:[]}},
  }
};

function archiveDay(date, meals) {
  // Compute totals for the given meals and store in history
  const totals = zeroNutrients();
  for (const slot of MEAL_SLOTS) {
    for (const item of (meals[slot.key]||[])) {
      const n = mealItemNutrients(item);
      if (n) addNutrients(totals, n);
    }
  }
  // Only save if any food was logged
  const hasData = NUTRIENT_KEYS.some(k => totals[k] > 0);
  if (!hasData) return;
  // Remove any existing entry for this date then prepend
  S.data.history = S.data.history.filter(h => h.date !== date);
  S.data.history.unshift({ date, totals, targets: {...S.data.targets} });
  // Keep max 90 days
  if (S.data.history.length > 90) S.data.history = S.data.history.slice(0, 90);
}

function loadData() {
  try {
    const d = localStorage.getItem('nourish_v2');
    if (d) {
      const parsed = JSON.parse(d);
      S.data = {...S.data, ...parsed};
      if (!S.data.portionPresets) S.data.portionPresets = {};
      if (!S.data.history) S.data.history = [];
      if (S.data.dailyPlan.date !== TODAY) {
        // Archive the previous day before resetting
        archiveDay(S.data.dailyPlan.date, S.data.dailyPlan.meals);
        S.data.dailyPlan = {date:TODAY, meals:{breakfast:[],morningSnack:[],lunch:[],afternoonSnack:[],dinner:[],eveningSnack:[]}};
      }
    } else {
      // First run — seed with imported spreadsheet data
      S.data.customIngredients = SEED_INGREDIENTS;
      S.data.recipes = SEED_RECIPES;
      S.data.portionPresets = SEED_PRESETS;
    }
  } catch(e) {}
}
function saveData() {
  // Keep today's snapshot up to date in history as we log
  archiveDay(TODAY, S.data.dailyPlan.meals);
  try { localStorage.setItem('nourish_v2', JSON.stringify(S.data)); } catch(e) {}
}

function allIngredients() { return [...BUILT_IN, ...S.data.customIngredients]; }
function findIngredient(name) { return allIngredients().find(i => i.name === name); }
function findRecipe(name) { return S.data.recipes.find(r => r.name === name); }
function getPresets(ingName) { return S.data.portionPresets[ingName] || []; }
function allRecipeCategories() {
  const custom = [...new Set(S.data.recipes.map(r => r.category).filter(c => c && !PRESET_RECIPE_CATEGORIES.includes(c)))];
  return [...PRESET_RECIPE_CATEGORIES, ...custom];
}
function savePreset(ingName, label, grams) {
  if (!label?.trim() || !grams) { alert('Enter a name and grams.'); return; }
  if (!S.data.portionPresets[ingName]) S.data.portionPresets[ingName] = [];
  S.data.portionPresets[ingName].push({label: label.trim(), grams: parseFloat(grams)});
  saveData(); renderView();
}
function deletePreset(ingName, idx) {
  S.data.portionPresets[ingName].splice(idx, 1);
  if (S.data.portionPresets[ingName].length === 0) delete S.data.portionPresets[ingName];
  saveData(); renderView();
}
function togglePresetEdit(idx) {
  const view = document.getElementById(`preset-view-${idx}`);
  const edit = document.getElementById(`preset-edit-${idx}`);
  if (!view || !edit) return;
  const isHidden = edit.style.display === 'none';
  view.style.display = isHidden ? 'none' : 'flex';
  edit.style.display = isHidden ? 'block' : 'none';
}
function updatePreset(ingName, idx) {
  const label = document.getElementById(`preset-edit-label-${idx}`)?.value?.trim();
  const grams = parseFloat(document.getElementById(`preset-edit-grams-${idx}`)?.value);
  if (!label || !grams || grams <= 0) { alert('Enter a valid name and grams.'); return; }
  S.data.portionPresets[ingName][idx] = {label, grams};
  saveData(); renderView();
}

function zeroNutrients() {
  const n = {}; NUTRIENT_KEYS.forEach(k => n[k] = 0); return n;
}
function addNutrients(a, b) {
  NUTRIENT_KEYS.forEach(k => a[k] = (a[k]||0) + (b[k]||0));
}
function scaleNutrients(n, factor) {
  const r = {}; NUTRIENT_KEYS.forEach(k => r[k] = (n[k]||0) * factor); return r;
}

function recipeNutrientsPerServing(recipe) {
  const totals = zeroNutrients();
  for (const item of (recipe.items||[])) {
    const ing = findIngredient(item.name);
    if (ing) addNutrients(totals, scaleNutrients(ing, item.grams/100));
  }
  if (recipe.servings > 0) NUTRIENT_KEYS.forEach(k => totals[k] /= recipe.servings);
  return totals;
}

function mealItemNutrients(item) {
  if (item.type === 'ingredient') {
    const ing = findIngredient(item.name);
    return ing ? scaleNutrients(ing, item.qty/100) : null;
  } else {
    const r = findRecipe(item.name);
    return r ? scaleNutrients(recipeNutrientsPerServing(r), item.qty) : null;
  }
}

function dailyTotals() {
  const totals = zeroNutrients();
  for (const slot of MEAL_SLOTS) {
    for (const item of (S.data.dailyPlan.meals[slot.key]||[])) {
      const n = mealItemNutrients(item);
      if (n) addNutrients(totals, n);
    }
  }
  return totals;
}

function fmt(v, dp=1) {
  if (v === null || v === undefined) return '—';
  return v < 0.05 ? '0' : v.toFixed(dp);
}
function pct(val, tgt) { return tgt > 0 ? val/tgt : null; }
function barClass(p) {
  if (p === null) return 'bar-ok';
  if (p < 0.9) return 'bar-under';
  if (p > 1.1) return 'bar-over';
  return 'bar-ok';
}
function statusText(p) {
  if (p === null) return '';
  if (p < 0.9) return '⬇ top up';
  if (p > 1.1) return '⬆ over';
  return '✓ on track';
}

function todayDateStr() {
  return new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
}

function highlight(text, q) {
  if (!q) return text;
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0,idx) + '<mark>' + text.slice(idx, idx+q.length) + '</mark>' + text.slice(idx+q.length);
}

function renderToday() {
  setHeader('Thrive', todayDateStr());
  const totals = dailyTotals();

  let barsHtml = '<div class="nutrient-grid">';
  for (const n of TRACKED_NUTRIENTS) {
    const val = totals[n.key] || 0;
    const tgt = S.data.targets[n.key] || 0;
    const p = pct(val, tgt);
    const pctNum = p !== null ? Math.min(Math.round(p*100), 100) : 0;
    const cls = barClass(p);
    const status = statusText(p);
    const statusCol = p === null ? 'var(--muted)' : p < 0.9 ? '#c87800' : p > 1.1 ? '#2060a0' : 'var(--sage)';
    barsHtml += `
      <div class="nutrient-bar-card" style="cursor:pointer;-webkit-tap-highlight-color:transparent" onclick="openNutrientBreakdown('${n.key}')">
        <div class="nutrient-bar-top">
          <span class="nutrient-bar-name">${n.label}</span>
          <span class="nutrient-bar-val">${fmt(val)}<span style="font-size:9px;color:var(--muted)"> ${n.unit}</span></span>
        </div>
        <div class="nutrient-bar-track"><div class="nutrient-bar-fill ${cls}" style="width:${pctNum}%"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:3px">
          <span style="font-size:10px;font-weight:700;color:${statusCol}">${status || '—'}</span>
          <span style="font-size:10px;color:var(--muted)">${tgt > 0 ? Math.round((val/tgt)*100)+'%' : '—'}</span>
        </div>
      </div>`;
  }
  barsHtml += '</div>';

  let mealsHtml = '';
  for (const slot of MEAL_SLOTS) {
    const items = S.data.dailyPlan.meals[slot.key] || [];
    const isOpen = S.expandedMeals.has(slot.key);
    let itemsHtml = '';
    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const n = mealItemNutrients(item);
      const sub = item.type === 'ingredient'
        ? `${item.qty}g · P: ${fmt(n?.protein||0)}g  C: ${fmt(n?.carbs||0)}g  F: ${fmt(n?.fat||0)}g`
        : `${item.qty} serving${item.qty !== 1 ? 's' : ''} · P: ${fmt(n?.protein||0)}g  C: ${fmt(n?.carbs||0)}g  F: ${fmt(n?.fat||0)}g`;
      const recipeIdx = item.type === 'recipe' ? S.data.recipes.findIndex(r => r.name === item.name) : -1;
      const clickAction = item.type === 'ingredient'
        ? `navigate('foods',{type:'view-food',name:'${item.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}'})`
        : (recipeIdx >= 0 ? `navigate('recipes',{type:'recipe-detail',id:${recipeIdx}})` : '');
      itemsHtml += `
        <div class="meal-item">
          <div class="meal-item-info" style="cursor:pointer;-webkit-tap-highlight-color:transparent" onclick="${clickAction}">
            <div class="meal-item-name">${item.name}</div>
            <div class="meal-item-sub">${sub}</div>
          </div>
          <button class="meal-item-remove" onclick="removeMealItem('${slot.key}',${i})">×</button>
        </div>`;
    }
    mealsHtml += `
      <div class="meal-card">
        <div class="meal-header" onclick="toggleMeal('${slot.key}')">
          <div class="meal-header-left">
            <div class="meal-dot ${items.length ? 'has-items' : ''}"></div>
            <span class="meal-name">${slot.icon} ${slot.label}</span>
            ${items.length ? `<span class="meal-count">${items.length} item${items.length > 1 ? 's' : ''}</span>` : ''}
          </div>
          <span class="meal-chevron ${isOpen ? 'open' : ''}">▾</span>
        </div>
        ${isOpen ? `<div class="meal-body">${itemsHtml}<button class="meal-add-btn" onclick="openAddSheet('${slot.key}')">＋ Add food or recipe</button></div>` : ''}
      </div>`;
  }

  document.getElementById('content').innerHTML = `
    <div class="view">
      <div class="section-label">Today's Progress</div>
      ${barsHtml}
      <div class="section-label" style="margin-top:20px">Meals</div>
      ${mealsHtml}
    </div>`;
}

function toggleMeal(key) {
  if (S.expandedMeals.has(key)) S.expandedMeals.delete(key);
  else S.expandedMeals.add(key);
  renderView();
}

function removeMealItem(slotKey, idx) {
  S.data.dailyPlan.meals[slotKey].splice(idx, 1);
  saveData(); renderView();
}

let sheetState = {mealKey: null, type: 'ingredient', selected: null, query: '', presetSelected: null};

function openAddSheet(mealKey) {
  sheetState = {mealKey, type: 'ingredient', selected: null, query: '', presetSelected: null};
  document.getElementById('sheet-title').textContent = 'Add to meal';
  renderSheet();
  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  setTimeout(() => document.getElementById('sheet-search-input')?.focus(), 350);
}

function renderSheet() {
  const q = sheetState.query.toLowerCase();
  let resultsHtml = '';

  if (sheetState.type === 'ingredient') {
    const filtered = allIngredients().filter(i => i.name.toLowerCase().includes(q) || i.group.toLowerCase().includes(q));
    if (filtered.length === 0) resultsHtml = '<p style="color:var(--muted);font-size:14px;padding:12px 0">No ingredients found. Add it in the Foods tab!</p>';
    else filtered.slice(0,30).forEach(i => {
      const presets = getPresets(i.name);
      const presetBadge = presets.length ? `<span style="font-size:10px;background:var(--mint);color:var(--sage);padding:2px 6px;border-radius:8px;font-weight:800;margin-left:4px">${presets.length} sizes</span>` : '';
      resultsHtml += `<div class="sheet-result" onclick="selectSheetItem('${i.name.replace(/'/g,"\\'")}')">
        <div style="flex:1"><div class="sheet-result-name">${highlight(i.name, sheetState.query)}${presetBadge}</div><div class="sheet-result-group">${i.group} · per 100g</div></div>
        <span style="color:var(--muted);font-size:12px">P:${fmt(i.protein)}g C:${fmt(i.carbs)}g F:${fmt(i.fat)}g</span>
      </div>`;
    });
  } else {
    const filtered = S.data.recipes.filter(r => r.name.toLowerCase().includes(q));
    if (filtered.length === 0) resultsHtml = '<p style="color:var(--muted);font-size:14px;padding:12px 0">No recipes yet. Create one in the Recipes tab!</p>';
    else filtered.forEach(r => {
      const n = recipeNutrientsPerServing(r);
      resultsHtml += `<div class="sheet-result" onclick="selectSheetItem('${r.name.replace(/'/g,"\\'")}')">
        <div style="flex:1"><div class="sheet-result-name">${highlight(r.name, sheetState.query)}</div><div class="sheet-result-group">${r.servings} servings · per serving below</div></div>
        <span style="color:var(--muted);font-size:12px">P:${fmt(n.protein)}g C:${fmt(n.carbs)}g F:${fmt(n.fat)}g</span>
      </div>`;
    });
  }

  // Qty / preset section
  let qtySection = '';
  if (sheetState.selected) {
    const presets = sheetState.type === 'ingredient' ? getPresets(sheetState.selected) : [];
    const isCustomMode = sheetState.presetSelected === 'custom' || presets.length === 0;
    const isRecipe = sheetState.type === 'recipe';

    let presetsHtml = '';
    if (presets.length > 0) {
      presetsHtml = `<div class="presets-section">
        <div class="presets-label">Quick sizes</div>
        <div class="preset-chips">`;
      presets.forEach((p, i) => {
        const sel = sheetState.presetSelected === i;
        presetsHtml += `<button class="preset-chip ${sel?'selected':''}" onclick="selectPreset(${i})">${p.label} <span style="opacity:.7;font-size:11px">${p.grams}g</span></button>`;
      });
      presetsHtml += `<button class="preset-chip preset-chip-custom ${sheetState.presetSelected==='custom'?'selected':''}" onclick="selectPreset('custom')">Custom</button>`;
      presetsHtml += `</div></div>`;
    }

    const showInput = isRecipe || isCustomMode;
    const defaultQty = isRecipe ? 1 : 100;
    const unit = isRecipe ? 'servings' : 'g';

    qtySection = `<div class="sheet-qty-section">
      <div class="sheet-qty-label">✓ ${sheetState.selected}</div>
      ${presetsHtml}
      ${showInput ? `<div class="sheet-qty-row">
        <input type="number" id="sheet-qty" min="0" step="${isRecipe?'0.5':'5'}" value="${defaultQty}" placeholder="${defaultQty}">
        <span class="sheet-qty-unit">${unit}</span>
      </div>` : `<div style="background:var(--white);border-radius:8px;padding:10px 12px;font-size:14px;font-weight:700;color:var(--sage)">
        ${presets[sheetState.presetSelected]?.grams}g selected
      </div>`}
      <button class="btn btn-primary" style="margin-top:12px" onclick="confirmAddMealItem()">Add to meal</button>
    </div>`;
  }

  document.getElementById('sheet-body').innerHTML = `
    <div class="sheet-toggle">
      <button class="sheet-toggle-btn ${sheetState.type==='ingredient'?'active':''}" onclick="setSheetType('ingredient')">🌿 Ingredient</button>
      <button class="sheet-toggle-btn ${sheetState.type==='recipe'?'active':''}" onclick="setSheetType('recipe')">🥗 Recipe</button>
    </div>
    <div class="sheet-search">
      <input id="sheet-search-input" type="text" placeholder="Search…" value="${sheetState.query}" oninput="sheetSearch(this.value)">
    </div>
    ${resultsHtml}
    ${qtySection}
    <div style="height:16px"></div>`;
}

function setSheetType(type) { sheetState.type = type; sheetState.selected = null; sheetState.query = ''; sheetState.presetSelected = null; renderSheet(); setTimeout(()=>document.getElementById('sheet-search-input')?.focus(),100); }
function sheetSearch(q) { sheetState.query = q; sheetState.selected = null; sheetState.presetSelected = null; renderSheet(); }
function selectSheetItem(name) {
  sheetState.selected = name;
  // Auto-select first preset if available
  const presets = sheetState.type === 'ingredient' ? getPresets(name) : [];
  sheetState.presetSelected = presets.length > 0 ? 0 : (sheetState.type === 'ingredient' ? 'custom' : null);
  renderSheet();
  setTimeout(()=>document.getElementById('sheet-qty')?.focus(),100);
}
function selectPreset(idx) {
  sheetState.presetSelected = idx;
  renderSheet();
  if (idx === 'custom') setTimeout(()=>document.getElementById('sheet-qty')?.focus(),100);
}

function confirmAddMealItem() {
  let qty;
  const presets = sheetState.type === 'ingredient' ? getPresets(sheetState.selected) : [];
  if (sheetState.type === 'ingredient' && sheetState.presetSelected !== 'custom' && sheetState.presetSelected !== null && presets[sheetState.presetSelected]) {
    qty = presets[sheetState.presetSelected].grams;
  } else {
    qty = parseFloat(document.getElementById('sheet-qty')?.value);
  }
  if (!sheetState.selected || !qty || qty <= 0) return;
  S.data.dailyPlan.meals[sheetState.mealKey].push({type: sheetState.type, name: sheetState.selected, qty});
  saveData(); closeSheet(); S.expandedMeals.add(sheetState.mealKey); renderView();
}

function closeSheet() {
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

function openNutrientBreakdown(key) {
  const nutrient = TRACKED_NUTRIENTS.find(n => n.key === key);
  if (!nutrient) return;

  const contributions = [];
  for (const slot of MEAL_SLOTS) {
    for (const item of (S.data.dailyPlan.meals[slot.key] || [])) {
      const n = mealItemNutrients(item);
      if (!n) continue;
      const amount = n[key] || 0;
      if (amount > 0) contributions.push({ name: item.name, meal: slot.label, amount, type: item.type, qty: item.qty });
    }
  }
  contributions.sort((a, b) => b.amount - a.amount);

  const total = contributions.reduce((s, c) => s + c.amount, 0);
  const tgt = S.data.targets[key] || 0;

  let html = '';
  if (contributions.length === 0) {
    html = `<div class="empty-state" style="padding:30px 0"><div class="icon" style="font-size:36px">🌿</div><p>Nothing logged yet today.</p></div>`;
  } else {
    contributions.forEach((c, ci) => {
      const pct = total > 0 ? c.amount / total : 0;
      const barW = Math.round(pct * 100);
      const isRecipe = c.type === 'recipe';

      // Build sub-breakdown for recipes
      let subHtml = '';
      if (isRecipe) {
        const recipe = findRecipe(c.name);
        if (recipe && recipe.items?.length) {
          // Per serving nutrients for each ingredient, scaled by qty served
          const ingContribs = recipe.items.map(item => {
            const ing = findIngredient(item.name);
            const amount = ing ? (ing[key] || 0) * item.grams / 100 / (recipe.servings || 1) * c.qty : 0;
            return { name: item.name, amount };
          }).filter(x => x.amount > 0).sort((a, b) => b.amount - a.amount);

          if (ingContribs.length) {
            subHtml = `<div id="sub-${ci}" style="display:none;margin-top:8px;padding:8px 10px;background:var(--mint);border-radius:8px">`;
            ingContribs.forEach(ing => {
              const ingPct = c.amount > 0 ? ing.amount / c.amount : 0;
              subHtml += `
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
                  <span style="font-size:11px;color:var(--mid);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ing.name}</span>
                  <div class="nutrient-bar-track" style="width:60px;flex-shrink:0;height:5px">
                    <div class="nutrient-bar-fill bar-ok" style="width:${Math.round(ingPct*100)}%;height:100%;background:var(--sage-light)"></div>
                  </div>
                  <span style="font-size:11px;font-weight:700;color:var(--dark);width:50px;text-align:right;flex-shrink:0">${fmt(ing.amount)} ${nutrient.unit}</span>
                </div>`;
            });
            subHtml += '</div>';
          }
        }
      }

      const expandBtn = isRecipe && subHtml
        ? `<button onclick="toggleNutrientSub(${ci})" id="sub-btn-${ci}"
            style="background:none;border:none;color:var(--sage);font-size:11px;font-weight:700;cursor:pointer;padding:0;margin-left:6px;-webkit-tap-highlight-color:transparent">
            ▸ ingredients
           </button>`
        : '';

      html += `
        <div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
            <div style="min-width:0;flex:1">
              <span style="font-size:13px;font-weight:700;color:var(--dark)">${c.name}</span>
              <span style="font-size:11px;color:var(--muted);margin-left:6px">${c.meal}</span>
              ${expandBtn}
            </div>
            <span style="font-size:13px;font-weight:800;color:var(--dark);flex-shrink:0;margin-left:8px">${fmt(c.amount)} ${nutrient.unit}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="nutrient-bar-track" style="flex:1;height:8px">
              <div class="nutrient-bar-fill bar-ok" style="width:${barW}%;height:100%"></div>
            </div>
            <span style="font-size:11px;color:var(--muted);width:32px;text-align:right">${Math.round(pct*100)}%</span>
          </div>
          ${subHtml}
        </div>`;
    });

    html += `<div style="border-top:1.5px solid var(--cream-dark);padding-top:12px;margin-top:4px">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span style="font-size:13px;font-weight:800;color:var(--dark)">Total</span>
        <span style="font-size:14px;font-weight:800;color:var(--dark)">${fmt(total)} ${nutrient.unit}</span>
      </div>
      ${tgt > 0 ? `<div style="display:flex;justify-content:space-between;margin-top:4px">
        <span style="font-size:12px;color:var(--muted)">Target</span>
        <span style="font-size:12px;color:var(--muted)">${fmt(tgt)} ${nutrient.unit} (${Math.round((total/tgt)*100)}%)</span>
      </div>` : ''}
    </div>`;
  }

  document.getElementById('sheet-title').textContent = `${nutrient.label} breakdown`;
  document.getElementById('sheet-body').innerHTML = `<div style="padding-top:4px">${html}</div>`;
  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('sheet').classList.add('open');
}

function toggleNutrientSub(ci) {
  const sub = document.getElementById(`sub-${ci}`);
  const btn = document.getElementById(`sub-btn-${ci}`);
  if (!sub) return;
  const open = sub.style.display === 'none';
  sub.style.display = open ? 'block' : 'none';
  if (btn) btn.textContent = open ? '▾ ingredients' : '▸ ingredients';
}

function renderRecipes() {
  setHeader('Recipes', '', '+ New', () => navigate('recipes', {type:'add-recipe'}));
  const recipes = S.data.recipes;
  let html = '<div class="view">';

  if (recipes.length === 0) {
    html += `<div class="empty-state"><div class="icon">🥗</div><p>No recipes yet.<br>Tap <b>+ New</b> to create your first recipe.</p></div>`;
    html += '</div>';
    document.getElementById('content').innerHTML = html;
    return;
  }

  // Filter chips
  const cats = allRecipeCategories().filter(c => recipes.some(r => r.category === c));
  const allFilters = ['All', ...cats];
  html += `<div class="chart-nutrient-chips" style="margin-bottom:14px">
    ${allFilters.map(f => `<button class="chart-chip ${recipeFilter===f?'on':''}"
      style="background:${recipeFilter===f?'var(--sage)22':'var(--cream)'};border-color:${recipeFilter===f?'var(--sage)':'transparent'};color:${recipeFilter===f?'var(--sage)':'var(--mid)'}"
      onclick="setRecipeFilter('${f}')">${f}</button>`).join('')}
  </div>`;

  const emojis = ['🥗','🍲','🥘','🫕','🍛','🥙','🫔','🍜','🥣','🥞'];

  // Determine which groups to show
  const filtered = recipeFilter === 'All' ? recipes : recipes.filter(r => r.category === recipeFilter);
  const uncategorised = filtered.filter(r => !r.category);

  if (filtered.length === 0) {
    html += `<div class="empty-state"><div class="icon">🔍</div><p>No recipes in this category yet.</p></div>`;
  } else if (recipeFilter !== 'All') {
    // Single category — no group header needed
    filtered.forEach(r => {
      const i = recipes.indexOf(r);
      const n = recipeNutrientsPerServing(r);
      html += recipeCard(r, i, n, emojis);
    });
  } else {
    // All — show by group
    const groupsToShow = allRecipeCategories().filter(c => recipes.some(r => r.category === c));
    groupsToShow.forEach(cat => {
      const group = recipes.filter(r => r.category === cat);
      if (!group.length) return;
      html += `<div class="section-label">${cat}</div>`;
      group.forEach(r => {
        const i = recipes.indexOf(r);
        const n = recipeNutrientsPerServing(r);
        html += recipeCard(r, i, n, emojis);
      });
    });
    if (uncategorised.length) {
      html += `<div class="section-label">Uncategorised</div>`;
      uncategorised.forEach(r => {
        const i = recipes.indexOf(r);
        const n = recipeNutrientsPerServing(r);
        html += recipeCard(r, i, n, emojis);
      });
    }
  }

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function recipeCard(r, i, n, emojis) {
  return `<div class="recipe-card" onclick="navigate('recipes',{type:'recipe-detail',id:${i}})">
    <span class="recipe-emoji">${emojis[i % emojis.length]}</span>
    <div class="recipe-info">
      <div class="recipe-name">${r.name}</div>
      <div class="recipe-meta">${r.category ? `<span class="tag" style="font-size:10px;padding:2px 7px;margin-right:6px">${r.category}</span>` : ''}${r.servings} serving${r.servings!==1?'s':''} · ${r.items?.length||0} ingredients</div>
      <div class="recipe-meta" style="margin-top:4px">Per serving: P ${fmt(n.protein)}g · C ${fmt(n.carbs)}g · F ${fmt(n.fat)}g</div>
    </div>
    <span class="recipe-chevron">›</span>
  </div>`;
}

function setRecipeFilter(cat) {
  recipeFilter = cat;
  renderView();
}

function toggleIngEdit(i) {
  const view = document.getElementById(`rview-${i}`);
  const edit = document.getElementById(`redit-${i}`);
  if (!view || !edit) return;
  const opening = edit.style.display === 'none';
  view.style.display = opening ? 'none' : 'flex';
  edit.style.display = opening ? 'block' : 'none';
  if (opening) document.getElementById(`redit-grams-${i}`)?.focus();
}

function saveIngEdit(recipeIdx, itemIdx) {
  const name = document.getElementById(`redit-name-${itemIdx}`)?.value?.trim();
  const grams = parseFloat(document.getElementById(`redit-grams-${itemIdx}`)?.value);
  if (!name || !grams || grams <= 0) { alert('Enter a valid ingredient name and grams.'); return; }
  if (!findIngredient(name)) { alert(`"${name}" not found in your foods database.`); return; }
  S.data.recipes[recipeIdx].items[itemIdx] = {name, grams};
  saveData(); renderView();
}

function onRecipeCategoryChange(sel) {
  const custom = document.getElementById('recipe-category-custom');
  if (custom) custom.style.display = sel.value === '__custom__' ? 'block' : 'none';
}

function saveRecipeDetails(idx) {
  const name = document.getElementById('recipe-name-input')?.value?.trim();
  const servings = parseInt(document.getElementById('recipe-servings-input')?.value);
  const catSel = document.getElementById('recipe-category-input')?.value;
  const catCustom = document.getElementById('recipe-category-custom')?.value?.trim();
  const category = catSel === '__custom__' ? catCustom : (catSel || '');
  if (!name) { alert('Please enter a recipe name.'); return; }
  if (catSel === '__custom__' && !catCustom) { alert('Please enter a category name.'); return; }
  if (name !== S.data.recipes[idx].name && S.data.recipes.find(r => r.name === name)) {
    alert('A recipe with that name already exists.'); return;
  }
  S.data.recipes[idx].name = name;
  S.data.recipes[idx].servings = servings || 1;
  S.data.recipes[idx].category = category;
  saveData(); renderView();
}

function removeRecipeItem(recipeIdx, itemIdx) {
  S.data.recipes[recipeIdx].items.splice(itemIdx, 1);
  saveData(); renderView();
}

function addRecipeItem(recipeIdx) {
  const name = document.getElementById('ri-name').value.trim();
  const grams = parseFloat(document.getElementById('ri-grams').value);
  if (!name || !grams || grams <= 0) { alert('Enter ingredient name and grams.'); return; }
  if (!findIngredient(name)) { alert(`"${name}" not found in your foods database.`); return; }
  if (!S.data.recipes[recipeIdx].items) S.data.recipes[recipeIdx].items = [];
  S.data.recipes[recipeIdx].items.push({name, grams});
  saveData(); renderView();
}

function deleteRecipe(idx) {
  const name = S.data.recipes[idx]?.name || 'this recipe';
  if (!confirm(`Are you sure you want to delete "${name}"? This can't be undone.`)) return;
  S.data.recipes.splice(idx, 1);
  saveData(); navigate('recipes');
}

function renderAddRecipe() {
  setHeader('New Recipe');
  document.getElementById('content').innerHTML = `
    <div class="view">
      <div class="form-group">
        <label class="form-label">Recipe Name</label>
        <input id="rn-name" type="text" placeholder="e.g. Salmon & veg bowl">

      <div class="form-group">
        <label class="form-label">Category</label>
        <select id="rn-category" onchange="onRecipeCategoryChange(this)" id="recipe-category-input">
          <option value="">— None —</option>
          ${allRecipeCategories().map(c => `<option>${c}</option>`).join('')}
          <option value="__custom__">＋ Add new category…</option>
        </select>
        <input id="recipe-category-custom" type="text" placeholder="New category name" style="display:none;margin-top:8px;padding:8px 10px;font-size:14px">
      </div>
      <div class="form-group">
        <label class="form-label">Number of Servings</label>
        <input id="rn-servings" type="number" value="1" min="1" step="1" placeholder="1">
        <div class="form-hint">How many servings does this recipe make?</div>

      <div class="btn-row">
        <button class="btn btn-ghost" onclick="goBack()">Cancel</button>
        <button class="btn btn-primary" onclick="createRecipe()">Create Recipe</button>
      </div>
    </div>`;
}

function createRecipe() {
  const name = document.getElementById('rn-name').value.trim();
  const servings = parseInt(document.getElementById('rn-servings').value);
  const catSel = document.getElementById('rn-category')?.value;
  const catCustom = document.getElementById('recipe-category-custom')?.value?.trim();
  const category = catSel === '__custom__' ? catCustom : (catSel || '');
  if (!name) { alert('Please enter a recipe name.'); return; }
  if (catSel === '__custom__' && !catCustom) { alert('Please enter a category name.'); return; }
  if (S.data.recipes.find(r => r.name === name)) { alert('A recipe with that name already exists.'); return; }
  S.data.recipes.push({name, servings: servings||1, category, items:[]});
  saveData();
  navigate('recipes', {type:'recipe-detail', id: S.data.recipes.length-1});
}

let foodSearch = '';

function renderFoods() {
  setHeader('My Foods', '', '+ Add', () => navigate('foods', {type:'add-food'}));
  const q = foodSearch.toLowerCase();
  const ings = [...S.data.customIngredients]
    .filter(i => !q || i.name.toLowerCase().includes(q) || i.group.toLowerCase().includes(q))
    .sort((a, b) => a.group.localeCompare(b.group) || a.name.localeCompare(b.name));

  let html = `<div class="view">
    <input type="text" placeholder="Search your foods…" value="${foodSearch}" oninput="foodSearch=this.value;renderView()" style="margin-bottom:12px">`;

  if (S.data.customIngredients.length === 0) {
    html += `<div class="empty-state"><div class="icon">🌿</div><p>No foods yet.<br>Tap <b>+ Add</b> to add your first food.<br><br><span style="font-size:12px">The built-in food database is still used for lookups — it just lives in the background.</span></p></div>`;
  } else if (ings.length === 0) {
    html += `<div class="empty-state"><div class="icon">🔍</div><p>No foods match your search.</p></div>`;
  } else {
    // Group whilst preserving GROUPS order
    const grouped = {};
    ings.forEach(i => { if (!grouped[i.group]) grouped[i.group]=[]; grouped[i.group].push(i); });
    GROUPS.forEach(g => {
      if (!grouped[g]) return;
      html += `<div class="card" style="margin-bottom:10px;overflow:hidden">
        <div class="group-header">${g}</div>`;
      grouped[g].forEach(ing => {
        html += `<div class="ing-row" onclick="viewFood('${ing.name.replace(/'/g,"\\'")}')">
          <span class="ing-name">${highlight(ing.name, foodSearch)}</span>
          <span class="ing-preview">P:${fmt(ing.protein)}g C:${fmt(ing.carbs)}g F:${fmt(ing.fat)}g</span>
        </div>`;
      });
      html += `</div>`;
    });
  }
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function viewFood(name) {
  navigate('foods', {type:'view-food', name});
}

function renderAddFood() {
  const isView = S.subView.type === 'view-food';
  const existing = isView ? findIngredient(S.subView.name) : null;
  const isEditing = S.subView.editing === true;
  setHeader(isView ? S.subView.name : 'Add Food', isView ? existing?.group : '');

  const fields = [
    ['protein','Protein (g)'],['carbs','Carbs (g)'],['fibre','Fibre (g)'],['sugars','Sugars (g)'],
    ['fat','Total Fat (g)'],['satFat','Sat Fat (g)'],['unsatFat','Unsat Fat (g)'],['omega3','Omega-3 (mg)'],
    ['iron','Iron (mg)'],['calcium','Calcium (mg)'],['magnesium','Magnesium (mg)'],
    ['vitC','Vitamin C (mg)'],['vitD','Vitamin D (µg)'],['folate','Folate (µg)'],
    ['potassium','Potassium (mg)'],['sodium','Sodium (mg)'],
  ];
  const pairs = [];
  for (let i=0; i<fields.length; i+=2) pairs.push(fields.slice(i,i+2));
  const val = (k) => existing ? (existing[k]||0) : '';

  let formHtml = '';

  if (!isView || isEditing) {
    // ── ADD or EDIT form ──
    formHtml += `
      <div class="form-group">
        <label class="form-label">Name</label>
        <input id="fi-name" type="text" value="${existing?.name||''}" placeholder="e.g. Tempeh">
      </div>
      <div class="form-group">
        <label class="form-label">Food Group</label>
        <select id="fi-group">${GROUPS.map(g=>`<option ${existing?.group===g?'selected':''}>${g}</option>`).join('')}</select>
      </div>
      <div class="section-label">Values per 100g</div>`;
    pairs.forEach(pair => {
      formHtml += '<div class="form-row">';
      pair.forEach(([k,l]) => formHtml += `<div class="form-group"><label class="form-label">${l}</label><input id="fi-${k}" type="number" min="0" step="0.1" value="${val(k)}" placeholder="0"></div>`);
      formHtml += '</div>';
    });
    const saveTarget = isEditing ? `'${existing.name.replace(/'/g,"\\'")}'` : 'null';
    formHtml += `<div class="btn-row">
      <button class="btn btn-ghost" onclick="${isEditing ? `navigate('foods',{type:'view-food',name:'${existing.name.replace(/'/g,"\\'")}'})`:'goBack()'}">Cancel</button>
      ${isEditing ? `<button class="btn btn-danger btn-sm" onclick="deleteFood('${existing.name.replace(/'/g,"\\'")}')">Delete</button>` : ''}
      <button class="btn btn-primary" onclick="saveFood(${saveTarget})">${isEditing?'Save Changes':'Add Food'}</button>
    </div>`;

  } else {
    // ── VIEW — table format ──
    const editBtn = `<button class="btn btn-ghost" style="margin-bottom:16px" onclick="navigate('foods',{type:'view-food',name:'${existing.name.replace(/'/g,"\\'")}',editing:true})">✏️ Edit food values</button>`;
    formHtml += editBtn;
    let tableHtml = '<table class="nutrient-table">';
    ALL_NUTRIENT_DEFS.forEach(nd => {
      tableHtml += `<tr><td>${nd.label}</td><td>${fmt(existing[nd.key])} ${nd.unit}</td></tr>`;
    });
    tableHtml += '</table>';
    formHtml += `<div class="card"><div style="padding:12px 16px">${tableHtml}</div></div>`;
  }

  // ── Portion Presets (always shown in view mode) ──
  if (isView && !isEditing && existing) {
    const presets = getPresets(existing.name);
    const ingNameJs = existing.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

function saveFood(existingName) {
  const name = document.getElementById('fi-name').value.trim();
  const group = document.getElementById('fi-group').value;
  if (!name) { alert('Please enter a name.'); return; }
  const ing = {name, group, custom:true};
  NUTRIENT_KEYS.forEach(k => {
    const el = document.getElementById('fi-'+k);
    ing[k] = el ? (parseFloat(el.value)||0) : 0;
  });
  if (existingName) {
    const idx = S.data.customIngredients.findIndex(i => i.name === existingName);
    if (idx >= 0) {
      // If name changed, migrate presets
      if (name !== existingName && S.data.portionPresets[existingName]) {
        S.data.portionPresets[name] = S.data.portionPresets[existingName];
        delete S.data.portionPresets[existingName];
      }
      S.data.customIngredients[idx] = ing;
    }
  } else {
    if (S.data.customIngredients.find(i => i.name === name)) { alert('A food with that name already exists.'); return; }
    S.data.customIngredients.push(ing);
  }
  saveData();
  if (existingName) navigate('foods', {type:'view-food', name});
  else navigate('foods');
}

function deleteFood(name) {
  if (!confirm(`Delete "${name}"?`)) return;
  S.data.customIngredients = S.data.customIngredients.filter(i => i.name !== name);
  saveData(); navigate('foods');
}

function saveTarget(key, val) {
  S.data.targets[key] = parseFloat(val) || 0;
  saveData();
}
function saveBodyWeight() {
  S.data.bodyWeight = parseFloat(document.getElementById('bw-input').value) || null;
  saveData(); renderView();
}
function exportData() {
  const date = new Date().toISOString().slice(0, 10);
  const json = JSON.stringify(S.data, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `thrive-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const msg = document.getElementById('import-msg');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      // Basic validation — check it looks like Thrive data
      if (!parsed.customIngredients && !parsed.recipes && !parsed.targets) {
        throw new Error('File doesn\'t look like a Thrive backup.');
      }
      if (!confirm('This will replace all your current data with the backup. Are you sure?')) return;
      S.data = {...S.data, ...parsed};
      if (!S.data.portionPresets) S.data.portionPresets = {};
      if (!S.data.history) S.data.history = [];
      saveData();
      msg.style.display = 'block';
      msg.style.color = 'var(--sage)';
      msg.textContent = '✓ Backup restored successfully!';
      setTimeout(() => renderView(), 1200);
    } catch(err) {
      msg.style.display = 'block';
      msg.style.color = '#c04030';
      msg.textContent = '✗ Could not read file — make sure it\'s a Thrive backup.';
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function resetTargets() {
  if (!confirm('Reset all targets to defaults?')) return;
  S.data.targets = {...DEFAULT_TARGETS};
  saveData(); renderView();
}

function friendlyDate(isoDate) {
  const d = new Date(isoDate + 'T12:00:00');
  const today = new Date(TODAY + 'T12:00:00');
  const diff = Math.round((today - d) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Yesterday';
  if (diff < 7) return d.toLocaleDateString('en-GB', {weekday:'long'});
  return d.toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'});
}

function renderHistory() {
  setHeader('History', 'last 90 days');
  const history = S.data.history;

  const tabRow = `
    <div class="history-tab-row">
      <button class="history-tab-btn ${chartState.tab==='log'?'active':''}" onclick="setHistoryTab('log')">📋 Log</button>

    </div>`;

  let html = `<div class="view">${tabRow}`;

  if (history.length === 0) {
    html += `<div class="empty-state"><div class="icon">📈</div>
      <p>No history yet.<br>Log some meals today and come back tomorrow — your daily progress will appear here automatically.</p>
    </div>`;
    html += '</div>';
    document.getElementById('content').innerHTML = html;
    return;
  }

  if (chartState.tab === 'chart') {
    // ── CHART TAB ──
    const ranges = [7, 30, 90];
    const rangeHtml = `<div class="chart-toolbar">
      ${ranges.map(r => `<button class="chart-range-btn ${chartState.range===r?'active':''}" onclick="setChartRange(${r})">${r} days</button>`).join('')}

    const chipsHtml = `<div class="chart-nutrient-chips">

        return `<button class="chart-chip ${on?'on':''}"
          style="background:${col}22;border-color:${on?col:'transparent'};color:${col}"

      }).join('')}
    </div>`;

    const targetToggle = `<label class="chart-target-toggle">
      <input type="checkbox" ${chartState.showTargets?'checked':''} onchange="toggleChartTargets(this.checked)">
      Show targets as dashed lines
    </label>`;

    // Legend
    const legendHtml = `<div class="chart-legend">
      ${TRACKED_NUTRIENTS.filter(n=>chartState.activeNutrients.has(n.key)).map(n =>
        `<div class="chart-legend-item"><div class="chart-legend-dot" style="background:${NUTRIENT_COLORS[n.key]}"></div>${n.label}</div>`
      ).join('')}
    </div>`;

    html += `${rangeHtml}${chipsHtml}${targetToggle}
      <div class="chart-wrap">
        <div class="chart-canvas-container"><canvas id="nutrient-chart"></canvas></div>
        ${legendHtml}
      </div>`;

  } else {
    // ── LOG TAB ──
    html += `<div class="page-intro">Tap any day to see the full nutrient breakdown.</div>`;
    for (const entry of history) {
      const label = friendlyDate(entry.date);
      const targets = entry.targets || S.data.targets;
      let miniBars = '';
      [['protein','P'],['carbs','C'],['fat','F']].forEach(([key, lbl]) => {
        const val = entry.totals[key] || 0;
        const tgt = targets[key] || 1;
        const p = Math.min(val / tgt, 1.3);
        const cls = p < 0.9 ? 'bar-under' : p > 1.1 ? 'bar-over' : 'bar-ok';
        miniBars += `
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:10px;font-weight:700;color:var(--mid)">${lbl}</span>
              <span style="font-size:10px;font-weight:800;color:var(--dark)">${Math.round(val)}${key==='protein'||key==='carbs'||key==='fat'||key==='fibre'?'g':''}</span>
            </div>
            <div class="nutrient-bar-track"><div class="nutrient-bar-fill ${cls}" style="width:${Math.min(Math.round(p*100),100)}%"></div></div>
            <div style="font-size:9px;color:var(--muted);text-align:right;margin-top:2px">${Math.round(p*100)}%</div>
          </div>`;
      });
      const tracked = TRACKED_NUTRIENTS;
      const onTrack = tracked.filter(n => {
        const tgt = targets[n.key]||0; if(!tgt) return false;
        const p = (entry.totals[n.key]||0)/tgt; return p>=0.9&&p<=1.1;
      }).length;
      const statusColor = onTrack>=tracked.length*.75?'var(--sage)':onTrack>=tracked.length*.5?'#c0694a':'var(--muted)';
      html += `

  html += '</div>';

  if (chartState.tab === 'chart') {

function setHistoryTab(tab) {
  if (chartState.chartInstance) { chartState.chartInstance.destroy(); chartState.chartInstance = null; }
  chartState.tab = tab;
  renderView();
}

function setChartRange(r) {
  chartState.range = r;
  rebuildChart();
}

function toggleChartNutrient(key) {
  if (chartState.activeNutrients.has(key)) {
    if (chartState.activeNutrients.size === 1) return; // keep at least one
    chartState.activeNutrients.delete(key);
  } else {
    chartState.activeNutrients.add(key);
  }
  rebuildChart();
}

function toggleChartTargets(val) {
  chartState.showTargets = val;
  if (chartState.chartInstance) {
    chartState.chartInstance.update('none'); // 'none' skips animation
  }
}

function rebuildChart() {
  if (chartState.chartInstance) { chartState.chartInstance.destroy(); chartState.chartInstance = null; }
  renderView();
}

function buildChart() {
  const canvas = document.getElementById('nutrient-chart');
  if (!canvas) return;

  // Get the most recent `range` days of history, in chronological order
  const cutoff = new Date(TODAY + 'T12:00:00');
  cutoff.setDate(cutoff.getDate() - chartState.range + 1);
  const cutoffStr = cutoff.toISOString().slice(0,10);

  const entries = [...S.data.history]
    .filter(h => h.date >= cutoffStr)
    .sort((a,b) => a.date.localeCompare(b.date));

  if (entries.length === 0) {
    canvas.parentElement.innerHTML = '<div class="empty-state" style="padding:30px 0"><p>No data in this range yet.</p></div>';
    return;
  }

  const labels = entries.map(e => {
    const d = new Date(e.date + 'T12:00:00');
    return d.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
  });

  const activeList = TRACKED_NUTRIENTS.filter(n => chartState.activeNutrients.has(n.key));

  const datasets = [];

  // Value lines
  activeList.forEach(n => {
    const col = NUTRIENT_COLORS[n.key];
    datasets.push({
      label: n.label,
      data: entries.map(e => {
        const raw = e.totals[n.key] || 0;
        const tgt = (e.targets || S.data.targets)[n.key] || 1;
        return Math.round((raw / tgt) * 100); // as % of target
      }),
      borderColor: col,
      backgroundColor: col + '18',
      borderWidth: 2.5,
      pointRadius: entries.length <= 14 ? 4 : entries.length <= 30 ? 2.5 : 1.5,
      pointHoverRadius: 6,
      tension: 0.35,
      fill: false,
      _nutrientKey: n.key,
    });
  });


  chartState.chartInstance = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    plugins: [{
      id: 'targetLine',
      afterDraw(chart) {
        if (!chartState.showTargets) return;
        const yScale = chart.scales.y;
        const y100 = yScale.getPixelForValue(100);
        if (y100 < yScale.top || y100 > yScale.bottom) return;
        const ctx2 = chart.ctx;
        ctx2.save();
        ctx2.beginPath();
        ctx2.moveTo(chart.chartArea.left, y100);
        ctx2.lineTo(chart.chartArea.right, y100);
        ctx2.strokeStyle = '#2a362866';
        ctx2.lineWidth = 1;
        ctx2.setLineDash([6, 4]);
        ctx2.stroke();
        ctx2.restore();
      }
    }],
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#2a3628ee',
          titleFont: { family: 'Nunito', size: 12, weight: '800' },
          bodyFont: { family: 'Nunito', size: 11 },
          padding: 10,
          cornerRadius: 8,
          callbacks: {
            label: ctx => {
              const n = TRACKED_NUTRIENTS.find(n => n.label === ctx.dataset.label);
              if (!n) return null;
              const entryIdx = ctx.dataIndex;
              const entry = entries[entryIdx];
              const raw = entry ? (entry.totals[n.key] || 0) : 0;
              const tgt = entry ? ((entry.targets||S.data.targets)[n.key]||0) : 0;
              return ` ${ctx.dataset.label}: ${fmt(raw)} ${n.unit} (${ctx.parsed.y}% of target)`;
            },
            filter: item => item.parsed.y !== null,
          }
        },
      },
      scales: {
        x: {
          ticks: {
            font: { family: 'Nunito', size: 10 },
            color: '#9aaa96',
            maxRotation: 45,
            maxTicksLimit: chartState.range <= 7 ? 7 : chartState.range <= 30 ? 10 : 12,
          },
          grid: { color: '#ede7de' },
        },
        y: {
          ticks: {
            font: { family: 'Nunito', size: 10 },
            color: '#9aaa96',
            callback: v => v === 100 ? '100%' : v + '%',
            maxTicksLimit: 7,
          },
          grid: { color: '#ede7de' },
          title: {
            display: true,
            text: '% of daily target',
            font: { family: 'Nunito', size: 10 },
            color: '#9aaa96',
          }
        }
      }
    }
  });
}

function renderHistoryDay() {

      <div class="nutrient-bar-card">

  // Full nutrient table for remaining nutrients
  const remaining = ALL_NUTRIENT_DEFS.filter(d => !TRACKED_NUTRIENTS.find(t => t.key === d.key));
  let extraHtml = '<table class="nutrient-table">';

    extraHtml += `<tr><td>${nd.label}</td><td>${fmt(val)} ${nd.unit}${pctStr}</td></tr>`;

  extraHtml += '</table>';

  document.getElementById('content').innerHTML = `
    <div class="view">
      <div class="recipe-detail-header" style="margin:-16px -16px 16px">
        <div class="recipe-detail-name">${label}</div>
        <div class="recipe-detail-meta">Targets used on this day · ${date}</div>
      </div>
      <div class="section-label">Tracked Nutrients</div>
      ${barsHtml}
      <div class="section-label" style="margin-top:20px">All Nutrients</div>
      <div class="card"><div style="padding:12px 16px">${extraHtml}</div></div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════════

loadData();
renderView();


// Handle Android back button — go to Today rather than leaving app
function safePushState() {
  try { history.pushState(null, '', location.href); } catch(e) {}
}
window.addEventListener('popstate', () => {
  if (S.subView) {
    goBack();
  } else if (S.view !== 'today') {
    navigate('today');
  } else {
    return; // already on Today, let app close
  }
  safePushState();
});
safePushState();

// Register service worker for proper PWA install (removes Chrome badge)
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// Prevent pull-to-refresh on mobile
document.getElementById('content').addEventListener('touchstart', e => {}, {passive:true});
</script>
</body>
</html>
